version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.gpu
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - DATABASE_URL=sqlite:///./meeting_secretary.db
      - WHISPER_MODEL=small
      - WHISPER_DEVICE=cuda
      - WHISPER_COMPUTE_TYPE=float16
      - TASK_MODEL=google/flan-t5-large
      - USE_OLLAMA=${USE_OLLAMA:-false}
      - OLLAMA_MODEL=codellama:7b
      - OLLAMA_URL=http://ollama:11434
      - DIARIZATION_ENABLED=true
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
      - ~/.cache/huggingface:/root/.cache/huggingface:delegated
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - OLLAMA_HOST=0.0.0.0
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama: