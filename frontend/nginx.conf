server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy (if you want nginx to forward API calls)
    # location /api/ {
    #     proxy_pass http://backend:8000;
    # }
}